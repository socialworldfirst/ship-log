<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Shipped · Steven</title>
<style>
  /* ── Design tokens (mirrors Pilled) ────────────────── */
  :root {
    --bg: #0b0b0c;
    --rule: rgba(255,255,255,0.07);
    --rule-strong: rgba(255,255,255,0.14);
    --text: #ededec;
    --text-muted: #8a8a92;
    --text-faint: #54545a;
    --accent: #d4a574;
    --accent-soft: rgba(212,165,116,0.18);
    --bar: rgba(237,237,236,0.65);
    --bar-bg: rgba(255,255,255,0.045);
  }

  * { box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", system-ui, sans-serif;
    font-feature-settings: "ss01", "cv11", "tnum";
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text); min-height: 100vh;
    line-height: 1.55;
    font-size: 14px;
    letter-spacing: -0.005em;
  }

  /* ── Glass sticky nav ─────────────────────────────── */
  .page-nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; justify-content: center; gap: 4px;
    padding: 12px 16px;
    background: rgba(11, 11, 12, 0.55);
    backdrop-filter: saturate(160%) blur(20px);
    -webkit-backdrop-filter: saturate(160%) blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }
  .nav-tab {
    padding: 7px 18px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: rgba(237, 237, 236, 0.5); text-decoration: none;
    transition: color 0.15s, background 0.15s;
    font-family: inherit;
  }
  .nav-tab:hover { color: rgba(237, 237, 236, 0.9); }
  .nav-tab.active { color: var(--text); background: rgba(255, 255, 255, 0.06); }

  .wrap { max-width: 980px; margin: 0 auto; padding: 56px 32px 96px; }

  /* ── Header ────────────────────────────────────────── */
  .head { margin-bottom: 28px; padding-bottom: 0; }
  .eyebrow { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.14em; margin: 0 0 12px; font-weight: 500; }
  h1 {
    font-size: 38px; font-weight: 600; letter-spacing: -0.03em; line-height: 1.1;
    margin: 0 0 8px; color: var(--text);
    font-family: "Inter Tight", "Inter", -apple-system, sans-serif;
  }
  .sub { font-size: 14px; color: var(--text-muted); margin: 0; }

  /* ── Hero stats grid ─────────────────────────────── */
  .hero-stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    margin-top: 36px;
  }
  .stat-card { padding: 0 24px; border-left: 1px solid var(--rule); }
  .stat-card:first-child { padding-left: 0; border-left: 0; }
  .stat-card .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; margin-bottom: 8px; }
  .stat-card .val {
    font-size: 28px; font-weight: 600; color: var(--text);
    font-variant-numeric: tabular-nums; letter-spacing: -0.02em; line-height: 1;
    font-family: "Inter Tight", "Inter", sans-serif;
  }
  .stat-card .sub-val { font-size: 12px; color: var(--text-faint); margin-top: 6px; }

  /* ── Section ────────────────────────────────────────── */
  .section {
    border-top: 1px solid var(--rule);
    padding: 40px 0;
  }
  .section:last-of-type { border-bottom: 1px solid var(--rule); }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
  }
  h2 {
    font-size: 13px; font-weight: 500; margin: 0; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.12em;
  }
  .section-meta { font-size: 12px; color: var(--text-faint); font-variant-numeric: tabular-nums; }

  /* ── Project entry ─────────────────────────────────── */
  .project { padding: 24px 0; border-top: 1px solid var(--rule); }
  .project:first-child { border-top: 0; padding-top: 0; }
  .project-head {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 16px; margin-bottom: 10px;
  }
  .project-title {
    font-family: "Inter Tight", "Inter", sans-serif;
    font-size: 19px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.3;
    color: var(--text); margin: 0; flex: 1; min-width: 0;
  }
  .project-date {
    font-size: 11px; color: var(--text-faint);
    font-variant-numeric: tabular-nums; flex-shrink: 0;
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
  }
  .project-desc { font-size: 13px; color: var(--text-muted); margin: 0 0 14px; line-height: 1.65; }
  .project-actions {
    display: flex; flex-wrap: wrap; gap: 16px;
    align-items: center; font-size: 12px;
  }
  .project-tags { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
  .tag {
    font-size: 9px; padding: 2px 8px; border-radius: 3px;
    background: rgba(255,255,255,0.04); color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
    border: 1px solid var(--rule);
  }
  .project-links { display: flex; gap: 14px; font-size: 12px; flex-shrink: 0; }
  .link-live, .link-repo {
    text-decoration: none; transition: color 0.15s;
    font-weight: 500; letter-spacing: -0.005em;
  }
  .link-live { color: var(--accent); }
  .link-live:hover { color: #f5c990; }
  .link-repo { color: var(--text-muted); }
  .link-repo:hover { color: var(--text); }

  /* ── Footer ────────────────────────────────────────── */
  .footnote {
    font-size: 11px; color: var(--text-faint);
    margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--rule);
    line-height: 1.6; text-align: center;
  }
  .footnote a { color: var(--text-muted); text-decoration: none; }
  .footnote a:hover { color: var(--text); }

  /* ── Mobile ────────────────────────────────────────── */
  @media (max-width: 720px) {
    .wrap { padding: 28px 18px 60px; }
    h1 { font-size: 28px; }
    .sub { font-size: 13px; }
    .hero-stats { grid-template-columns: repeat(2, 1fr); margin-top: 28px; }
    .stat-card { padding: 16px 0; border-left: 0; border-top: 1px solid var(--rule); }
    .stat-card:nth-child(-n+2) { border-top: 0; padding-top: 0; }
    .stat-card:nth-child(2) { padding-left: 16px; border-left: 1px solid var(--rule); }
    .stat-card:nth-child(4) { padding-left: 16px; border-left: 1px solid var(--rule); }
    .stat-card .val { font-size: 22px; }
    .section { padding: 32px 0; }
    .project-head { flex-direction: column; gap: 6px; align-items: flex-start; }
    .project-actions { flex-direction: column; align-items: flex-start; gap: 10px; }
    .project-links { gap: 12px; }
  }
</style>
</head>
<body>
<nav class="page-nav">
  <a href="https://socialworldfirst.github.io/usage-dashboard/" class="nav-tab">Pilled</a>
  <a href="https://socialworldfirst.github.io/ship-log/" class="nav-tab active">Shipped</a>
</nav>
<div class="wrap">
  <header class="head">
    <p class="eyebrow" id="eyebrow">Loading…</p>
    <h1>Shipped.</h1>
    <p class="sub">Projects deployed by Social WorldFirst, sorted by last update.</p>

    <div class="hero-stats">
      <div class="stat-card">
        <div class="lbl">Total shipped</div>
        <div class="val" id="total-count">—</div>
        <div class="sub-val" id="total-sub">across all time</div>
      </div>
      <div class="stat-card">
        <div class="lbl">Last 30 days</div>
        <div class="val" id="recent-count">—</div>
        <div class="sub-val" id="recent-sub">recent activity</div>
      </div>
      <div class="stat-card">
        <div class="lbl">This month</div>
        <div class="val" id="month-count">—</div>
        <div class="sub-val" id="month-sub">—</div>
      </div>
      <div class="stat-card">
        <div class="lbl">Last shipped</div>
        <div class="val" id="last-name">—</div>
        <div class="sub-val" id="last-date">—</div>
      </div>
    </div>
  </header>

  <div id="timeline"></div>

  <p class="footnote">
    Built with Claude Code. Source: <a href="https://github.com/socialworldfirst">github.com/socialworldfirst</a>.
  </p>
</div>

<script>
async function loadProjects() {
  let projects;
  try {
    const res = await fetch('projects.json');
    projects = await res.json();
  } catch (e) {
    document.getElementById('timeline').innerHTML = '<p style="color: var(--text-faint); padding: 60px 0; text-align: center;">Failed to load projects.</p>';
    return;
  }

  projects.sort((a, b) => new Date(b.updated) - new Date(a.updated));

  // Eyebrow
  const total = projects.length;
  document.getElementById('total-count').textContent = total;

  // Last 30 days count
  const today = new Date();
  const thirtyDaysAgo = new Date(today.getTime() - 30 * 86400 * 1000);
  const recent = projects.filter(p => new Date(p.updated) >= thirtyDaysAgo).length;
  document.getElementById('recent-count').textContent = recent;

  // This month count
  const monthName = today.toLocaleDateString('en-US', { month: 'long' });
  const thisMonth = projects.filter(p => {
    const d = new Date(p.updated);
    return d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth();
  }).length;
  document.getElementById('month-count').textContent = thisMonth;
  document.getElementById('month-sub').textContent = monthName + ' ' + today.getFullYear();

  // Last shipped
  if (projects.length > 0) {
    const last = projects[0];
    document.getElementById('last-name').textContent = last.name;
    document.getElementById('last-date').textContent = new Date(last.updated).toLocaleDateString('en-US', {
      year: 'numeric', month: 'short', day: 'numeric'
    });
  }

  // Eyebrow text
  const lastUpdated = projects.length > 0 ? new Date(projects[0].updated).toLocaleDateString('en-US', {
    year: 'numeric', month: 'short', day: 'numeric'
  }) : '—';
  document.getElementById('eyebrow').textContent = `${total} projects · last update ${lastUpdated}`;

  // Group by month
  const groups = {};
  projects.forEach(p => {
    const d = new Date(p.updated);
    const key = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  });

  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';

  Object.entries(groups).forEach(([month, items]) => {
    const section = document.createElement('div');
    section.className = 'section';
    const meta = items.length === 1 ? '1 project' : `${items.length} projects`;
    section.innerHTML = `
      <div class="section-head">
        <h2>${month}</h2>
        <span class="section-meta">${meta}</span>
      </div>
      <div class="project-list"></div>
    `;
    const list = section.querySelector('.project-list');
    items.forEach(p => {
      const article = document.createElement('article');
      article.className = 'project';
      const updatedStr = new Date(p.updated).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      article.innerHTML = `
        <div class="project-head">
          <h3 class="project-title">${escapeHtml(p.name)}</h3>
          <div class="project-date">${updatedStr}</div>
        </div>
        <p class="project-desc">${escapeHtml(p.description)}</p>
        <div class="project-actions">
          <div class="project-tags">${p.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
          <div class="project-links">
            <a href="${p.url}" target="_blank" rel="noopener" class="link-live">Live →</a>
            <a href="${p.github}" target="_blank" rel="noopener" class="link-repo">Source</a>
          </div>
        </div>
      `;
      list.appendChild(article);
    });
    timeline.appendChild(section);
  });
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

loadProjects();
</script>
</body>
</html>
